name: Build Realme GT Neo6B SukiSU Ultra

on:
  workflow_dispatch:
    inputs:
      ANDROID_VERSION:
        description: "安卓KMI版本"
        required: true
        type: choice
        options:
          - 'android15'
          - 'android14'
          - 'android13'
          - 'android12'
        default: 'android14'
      KERNEL_VERSION:
        description: "内核版本"
        required: true
        type: choice
        options:
          - '6.6'
          - '6.1'
          - '5.15'
          - '5.10'
        default: '6.1'

jobs:
  build:
    name: Building for ${{ github.event.inputs.FEIL }} (${{ github.event.inputs.ANDROID_VERSION }}/${{ github.event.inputs.KERNEL_VERSION }})
    runs-on: ubuntu-latest
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"
      CCACHE_MAXSIZE: 8G
      CPU: 'sm8635'
      FEIL: 'realme_gt_neo6B'
      CPUD: 'pineapple'
      ANDROID_VERSION: ${{ github.event.inputs.ANDROID_VERSION }}
      KERNEL_VERSION: ${{ github.event.inputs.KERNEL_VERSION }}
      KERNEL_NAME: "-android${{ github.event.inputs.ANDROID_VERSION }}-SukiSU-bale"
      KERNELSU_VERSION: main
      SUSFS_ENABLED: true
      VFS_PATCH_ENABLED: false  # 禁用风驰游戏内核
      KSU_VAR: "SukiSU"

    steps:
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          swap-size-mb: 8192
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - name: Configure Git
        run: |
          git config --global user.name "MisterZtr"
          git config --global user.email "andey2004586@gmail.com"

      - name: Install Dependencies
        run: |
          sudo apt update && sudo apt upgrade -y
          sudo apt install -y python3 git curl libelf-dev build-essential flex bison

      - name: Install Repo Tool
        run: |
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/repo
          chmod a+x ~/repo
          sudo mv ~/repo /usr/local/bin/repo

      - name: Initialize Repo & Sync
        run: |
          mkdir kernel_workspace && cd kernel_workspace
          repo init -u https://github.com/realme-pineapple-devs/kernel_manifest.git \
                    -b refs/heads/realme/${{ env.CPU }} \
                    -m ${{ env.FEIL }}.xml --depth=1
          repo sync -c --no-tags --no-clone-bundle --force-sync
          rm kernel_platform/common/android/abi_gki_protected_exports_* || true
          rm kernel_platform/msm-kernel/android/abi_gki_protected_exports_* || true
          sed -i 's/ -dirty//g' kernel_platform/{common,msm-kernel}/scripts/setlocalversion

      - name: Setup SukiSU Ultra
        run: |
          cd kernel_workspace/kernel_platform
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/builtin/kernel/setup.sh" | bash -s builtin
          cd KernelSU && git checkout f1909411c0c3b464336967c70fd8a21b82225307 && cd ..
          curl -L -o sukisu_setup.bin https://github.com/Xiaomichael/OnePlus-Actions/raw/Build/script/sukisu_setup_40129.bin
          chmod +x sukisu_setup.bin
          ./sukisu_setup.bin
          rm sukisu_setup.bin

      - name: Apply SUSFS Patches
        if: ${{ env.SUSFS_ENABLED == 'true' }}
        run: |
          cd kernel_workspace
          git clone https://github.com/ShirkNeko/susfs4ksu.git -b gki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}
          cd kernel_platform/common
          patch -p1 < ../susfs4ksu/kernel_patches/50_add_susfs_in_gki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}.patch
          echo "完成SUSFS补丁应用"

      - name: Apply Hide Patches
        run: |
          cd kernel_workspace/kernel_platform/common
          curl -LO https://github.com/ShirkNeko/SukiSU_patch/raw/main/69_hide_stuff.patch
          patch -p1 -F 3 < 69_hide_stuff.patch

      - name: Configure Kernel Options
        run: |
          cd kernel_workspace/kernel_platform
          echo "CONFIG_KSU=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> ./common/arch/arm64/configs/gki_defconfig
          sed -i 's/check_defconfig//' ./common/build.config.gki
          echo "CONFIG_HEADERS_INSTALL=n" >> ./common/arch/arm64/configs/gki_defconfig

      - name: Build Kernel
        run: |
          cd kernel_workspace
          if [[ "${{ env.KERNEL_VERSION }}" == "6.1" ]]; then
            ./kernel_platform/build_with_bazel.py -t ${{ env.CPUD }} gki --action_env=KSU_VERSION
          else
            LTO=thin ./kernel_platform/oplus/build/oplus_build_kernel.sh ${{ env.CPUD }} gki
          fi

      - name: Package Artifacts
        run: |
          cd kernel_workspace
          zip -r Realme_GT_Neo6B_SukiSU_Ultra_${{ env.ANDROID_VERSION }}_${{ env.KERNEL_VERSION }}.zip \
                kernel/platform/msm-kernel-${{ env.CPUD }}-gki/dist/Image* \
                kernel/platform/msm-kernel-${{ env.CPUD }}-gki/dist/*.ko

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Realme_GT_Neo6B_Build
          path: |
            *.zip
          retention-days: 7
